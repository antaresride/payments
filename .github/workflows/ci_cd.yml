name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    # Use the native Ubuntu ARM64 runner
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: [setup-go Action](https://github.com/actions/setup-go)@v5
        with:
          go-version: '1.22' # Specify your Go version
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        # This runs natively on ARM64 hardware
        run: go test -v ./...
