name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Install golangci-lint from source
        # Installing from source ensures it is built with Go 1.26.1
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        # Use the freshly built binary in your Go path
        run: $(go env GOPATH)/bin/golangci-lint run ./...

      - name: Run tests
        run: go test -v ./...
